<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Public Wi-Fi Trust Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Smart Public Wi-Fi Trust Analyzer</h1>
        <p>Scan public Wi-Fi, review trust scores, and monitor for suspicious traffic in real time.</p>
    </header>
    <main>
        <section class="controls">
            <button id="scanButton">Scan Wi-Fi</button>
            <button id="clearAlertsButton">Clear Alerts</button>
        </section>
        <section id="networks" class="network-grid"></section>
        <section class="alerts-panel">
            <h2>Real-Time Alerts</h2>
            <div id="alerts"></div>
        </section>
    </main>
    <script>
        const scanButton = document.getElementById('scanButton');
        const networksEl = document.getElementById('networks');
        const alertsEl = document.getElementById('alerts');
        const clearAlertsButton = document.getElementById('clearAlertsButton');

        async function scanNetworks() {
            networksEl.innerHTML = '<p class="loading">Scanning networks...</p>';
            try {
                const response = await fetch('/scan');
                const networks = await response.json();
                if (!Array.isArray(networks)) {
                    networksEl.innerHTML = '<p class="error">Unable to scan Wi-Fi networks.</p>';
                    return;
                }
                networksEl.innerHTML = networks.map(net => `
                    <article class="network-card ${net.status.toLowerCase()}">
                        <div class="network-header">
                            <strong>${net.ssid}</strong>
                            <span class="status ${net.status.toLowerCase()}">${net.status}</span>
                        </div>
                        <p>Security: ${net.security}</p>
                        <p>Signal: ${net.signal}</p>
                        <div class="trust-bar">
                            <div class="trust-level" style="width: ${net.score}%"></div>
                        </div>
                        <p class="trust-summary">Score: ${net.score}/100 — ${net.reason}</p>
                        <button onclick="connectNetwork(${net.id})">Connect</button>
                    </article>
                `).join('');
            } catch (err) {
                networksEl.innerHTML = '<p class="error">Scan failed. Please retry.</p>';
            }
        }

        async function connectNetwork(index) {
            const password = prompt('Enter password if required (leave blank for open networks):');
            const response = await fetch(`/connect/${index}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password || null }),
            });
            const result = await response.json();
            if (response.ok) {
                alert(result.message);
            } else {
                alert(result.error || 'Connection failed.');
            }
        }

        function appendAlert(alert) {
            const item = document.createElement('div');
            item.className = `alert-item ${alert.severity.toLowerCase()}`;
            item.innerHTML = `
                <span class="alert-type">${alert.severity}</span>
                <strong>${alert.message}</strong>
                <div class="alert-details">${alert.details}</div>
            `;
            alertsEl.prepend(item);
            if (alertsEl.children.length > 50) {
                alertsEl.removeChild(alertsEl.lastChild);
            }
        }

        clearAlertsButton.addEventListener('click', async () => {
            await fetch('/api/clear_alerts', { method: 'POST' });
            alertsEl.innerHTML = '';
        });

        const eventSource = new EventSource('/api/alerts');
        eventSource.onmessage = (event) => {
            try {
                const alert = JSON.parse(event.data);
                appendAlert(alert);
            } catch (error) {
                console.error(error);
            }
        };

        eventSource.onerror = () => {
            console.warn('Alert stream disconnected.');
        };

        scanButton.addEventListener('click', scanNetworks);
        scanNetworks();
    </script>
</body>
</html>
